<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AR Heart</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
</head>

<body style="margin:0">

<a-scene
  vr-mode-ui="enabled: true"
  webxr="requiredFeatures: hit-test">

  <!-- Camera -->
  <a-camera></a-camera>

  <!-- Light -->
  <a-light type="ambient" intensity="1"></a-light>

  <!-- Reticle -->
  <a-entity id="reticle"
    geometry="primitive: ring; radiusInner: 0.05; radiusOuter: 0.06"
    material="color: white"
    visible="false">
  </a-entity>

  <!-- HEART + LABELS GROUP -->
  <a-entity id="heartGroup" visible="false">

    <!-- Heart Model -->
    <a-entity
      gltf-model="heart.glb"
      scale="0.3 0.3 0.3"
      animation="property: rotation; to: 0 360 0; loop: true; dur: 5000">
    </a-entity>

    <!-- LABELS -->
    <a-text value="Aorta" position="0 0.6 0" color="red" scale="0.5 0.5 0.5"></a-text>

    <a-text value="Left Atrium" position="-0.5 0.2 0" color="yellow" scale="0.4 0.4 0.4"></a-text>

    <a-text value="Right Ventricle" position="0.5 -0.3 0" color="cyan" scale="0.4 0.4 0.4"></a-text>

  </a-entity>

</a-scene>

<script>
let scene = document.querySelector('a-scene');
let reticle = document.querySelector('#reticle');
let heartGroup = document.querySelector('#heartGroup');

// HIT TEST
scene.addEventListener("enter-vr", () => {
  const session = scene.renderer.xr.getSession();

  if (!session) return;

  session.requestReferenceSpace('viewer').then((refSpace) => {
    session.requestHitTestSource({ space: refSpace }).then((source) => {

      function render(frame) {
        const ref = scene.renderer.xr.getReferenceSpace();
        const hits = frame.getHitTestResults(source);

        if (hits.length > 0) {
          const pose = hits[0].getPose(ref);

          reticle.setAttribute("visible", true);
          reticle.setAttribute("position", {
            x: pose.transform.position.x,
            y: pose.transform.position.y,
            z: pose.transform.position.z
          });
        }

        session.requestAnimationFrame(render);
      }

      session.requestAnimationFrame(render);
    });
  });
});

// TAP → PLACE HEART + LABELS
window.addEventListener("click", () => {
  if (reticle.getAttribute("visible")) {
    heartGroup.setAttribute("visible", true);
    heartGroup.setAttribute("position", reticle.getAttribute("position"));
  }
});
</script>

</body>
</html>
