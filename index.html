<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover" />
<title>Heart AR</title>
<style>
html,body{
  margin:0;
  padding:0;
  overflow:hidden;
  background:#000;
  font-family:Arial, sans-serif;
}
#ui{
  position:fixed;
  top:12px;
  left:12px;
  right:12px;
  z-index:10;
  color:#fff;
  background:rgba(0,0,0,.45);
  padding:12px;
  border-radius:12px;
  font-size:14px;
}
#btn{
  margin-top:8px;
  padding:8px 12px;
  border:none;
  border-radius:10px;
  font-weight:bold;
}
</style>
</head>
<body>

<div id="ui">
  <div id="status">Loading heart model...</div>
  <button id="btn">Reset Heart</button>
</div>

<script type="module" src="./main.js"></script>
</body>
</html>
