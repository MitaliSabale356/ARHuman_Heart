<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>3D Heart Viewer</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
</head>

<body style="margin:0; overflow:hidden;">

  <a-scene embedded background="color: #111">
    
    <a-assets>
      <a-asset-item id="heart" src="heart.glb"></a-asset-item>
    </a-assets>

    <!-- Camera -->
    <a-camera position="0 1.6 0"></a-camera>

    <!-- Light -->
    <a-light type="ambient" intensity="1"></a-light>
    <a-light type="directional" position="1 1 1"></a-light>

    <!-- Heart Model -->
    <a-entity id="model" 
      gltf-model="#heart"
      position="0 1 -3"
      scale="0.6 0.6 0.6"
      rotation="0 0 0"
      animation="property: rotation; to: 0 360 0; loop: true; dur: 4000"
      visible="false">
    </a-entity>

  </a-scene>

  <!-- Button -->
  <button onclick="showHeart()" 
    style="position:absolute; top:20px; left:20px; padding:12px 16px; font-size:16px; border:none; border-radius:8px; background:#ff4d4d; color:white;">
    Show Heart ❤️
  </button>

  <script>
    function showHeart() {
      document.querySelector('#model').setAttribute('visible', true);
    }
  </script>

</body>
</html>
